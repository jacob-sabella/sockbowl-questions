name: Secret Scan (TruffleHog)

# Scans commits and PRs for leaked secrets, and runs a weekly full-history
# sweep. The job fails only on VERIFIED secrets (TruffleHog confirmed the
# credential is live against the provider's API), so a real leaked key blocks
# the push while placeholders (e.g. change-me-*, ${VAR}) don't cause false
# positives. To scan more aggressively, add `unknown` to --results below.
on:
  push:
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1" # Mondays 06:00 UTC — full-history sweep

permissions:
  contents: read

jobs:
  trufflehog:
    name: TruffleHog
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history so diff-based scans have a base

      - name: TruffleHog secret scan
        uses: trufflesecurity/trufflehog@main
        with:
          # verified = TruffleHog confirmed the credential is live via the
          # provider's API. Fails the run on those only (low false-positive gate).
          extra_args: --results=verified
